# =============================================================================
# Kong API Gateway — Main Configuration
# VNPT AV Platform | WP-001 T06 | DB-less mode
# =============================================================================

database = off
declarative_config = /etc/kong/kong.yml

# ── Network ──────────────────────────────────────────────────────────────────
proxy_listen = 0.0.0.0:8000
admin_listen = 0.0.0.0:8001

# ── Plugins ──────────────────────────────────────────────────────────────────
plugins = bundled

# ── Logging ──────────────────────────────────────────────────────────────────
log_level = info
proxy_access_log = /dev/stdout
proxy_error_log  = /dev/stderr
admin_access_log = /dev/stdout
admin_error_log  = /dev/stderr

# ── Performance ──────────────────────────────────────────────────────────────
nginx_worker_processes = auto
nginx_http_keepalive_requests = 10000

# ── DNS resolver ─────────────────────────────────────────────────────────────
# Uses Kubernetes CoreDNS in cluster; local dev uses Docker embedded DNS
dns_resolver = 127.0.0.11 1.1.1.1
dns_hostsfile = /etc/hosts
