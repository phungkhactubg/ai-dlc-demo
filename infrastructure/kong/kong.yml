# ─────────────────────────────────────────────────────────────────────────────
# GLOBAL PLUGINS
# ─────────────────────────────────────────────────────────────────────────────
plugins:
  # Prometheus metrics — /metrics endpoint on port 8001
  - name: prometheus
    enabled: true
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true

  # Distributed tracing correlation ID
  - name: correlation-id
    enabled: true
    config:
      header_name: X-Trace-ID
      generator: uuid
      echo_downstream: true
