_format_version: "3.0"
_transform: true

# =============================================================================
# VNPT AV Platform — Kong API Gateway Declarative Configuration
# WP-001 T06 | DB-less mode
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# SERVICES
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── TMS — Tenant Management Service ────────────────────────────────────────
  - name: tms-service
    url: http://tms-service:8080
    connect_timeout: 2000
    write_timeout: 5000
    read_timeout: 5000
    routes:
      - name: tms-route
        paths:
          - /api/v1/tenants
        strip_path: false
        preserve_host: false
        protocols: [http, https]
    plugins:
      - name: jwt
        config:
          key_claim_name: kid
          algorithms: [RS256]
          run_on_preflight: false
      - name: rate-limiting
        config:
          minute: 1000
          policy: local
          limit_by: consumer
          error_message: "API rate limit exceeded. Retry after 60 seconds."
      - name: request-transformer
        config:
          add:
            headers:
              - "X-Kong-Proxy:true"

