# NATS Server Configuration
# VNPT AV Platform — WP-001 T03
# ─────────────────────────────────────────────────────────────────────────────
# Used for real-time, low-latency telemetry: vehicle GPS, trip state, ETA updates.
# Kafka handles durable event streams; NATS handles ephemeral pub/sub.
# ─────────────────────────────────────────────────────────────────────────────

port: 4222
http_port: 8222

# Maximum inbound message size: 1 MB
max_payload: 1048576

# ── TLS (disabled for local dev — enable in staging/production) ─────────────
# tls {
#   cert_file: "/etc/nats/certs/server-cert.pem"
#   key_file:  "/etc/nats/certs/server-key.pem"
#   ca_file:   "/etc/nats/certs/ca.pem"
#   verify:    true
# }

# ── Clustering (single node for local dev; scale to 3+ in production) ───────
cluster {
  name: "av-platform-nats"
  port: 6222
  # routes = [
  #   "nats://nats-2:6222"
  #   "nats://nats-3:6222"
  # ]
}

# ── JetStream (persistent streams for durable consumers) ────────────────────
jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 1073741824  # 1 GB
  max_file_store:   5368709120  # 5 GB
}

# ── Authorization (disabled for local dev — use NKeys/JWT in production) ────
# authorization {
#   token: "${NATS_AUTH_TOKEN}"
# }

# ── Logging ─────────────────────────────────────────────────────────────────
logtime: true
debug: false
trace: false
