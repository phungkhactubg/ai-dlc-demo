# =============================================================================
# Redis Configuration — VNPT AV Platform
# WP-001 T05
#
# Local dev: single-node. Production: 6-node cluster (3 masters + 3 replicas).
# =============================================================================

# ── Memory management ────────────────────────────────────────────────────────
maxmemory 2gb
maxmemory-policy allkeys-lru    # Evict least-recently-used keys when maxmemory is reached

# ── Persistence (RDB + AOF hybrid for safety) ────────────────────────────────
save 900 1      # Save if at least 1 key changed in 900 s
save 300 10     # Save if at least 10 keys changed in 300 s
save 60 10000   # Save if at least 10,000 keys changed in 60 s

appendonly yes
appendfsync everysec   # fsync every second (good balance of durability vs performance)
no-appendfsync-on-rewrite yes

# ── Networking ───────────────────────────────────────────────────────────────
bind 0.0.0.0
protected-mode no   # Disabled in docker network; re-enable for production

# ── Timeouts & connections ───────────────────────────────────────────────────
timeout 0
tcp-keepalive 300
maxclients 256

# ── Key expiry notifications (used by idempotency cleanup) ───────────────────
notify-keyspace-events ""   # Set to "Ex" in production for expiry event listening

# ── Slow log ────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000   # Log commands slower than 10 ms
slowlog-max-len 128
