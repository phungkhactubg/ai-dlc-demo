# BMS - Staging profile overrides
logging:
  level:
    com.vnpt.avplatform: INFO

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

influxdb:
  url: ${INFLUXDB_URL}
  token: ${INFLUXDB_TOKEN}
  org: ${INFLUXDB_ORG:vnpt-av}
  bucket: ${INFLUXDB_BUCKET:av-platform-metering-staging}
