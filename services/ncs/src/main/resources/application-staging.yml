# NCS - Staging profile overrides
logging:
  level:
    com.vnpt.avplatform: INFO

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

firebase:
  enabled: ${FIREBASE_ENABLED:true}
  credentials-path: ${FIREBASE_CREDENTIALS_PATH}
