spring:
  application:
    name: tms-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/av_platform_prod?replicaSet=rs0}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      enable-idempotence: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      auto-offset-reset: earliest
      isolation-level: read_committed
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.vnpt.avplatform.*"

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [traceId=%X{traceId}] [tenantId=%X{tenantId}] %logger{36} - %msg%n"
  level:
    com.vnpt.avplatform: INFO

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/v1/swagger-ui.html

app:
  security:
    jwt-secret: ${JWT_SECRET:changeme-tms-dev-secret-minimum-256-bits-long-key}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:3600000}

keycloak:
  admin:
    url: ${KEYCLOAK_URL:http://localhost:8080}
  realm: ${KEYCLOAK_REALM:av-platform-riders}
  client-id: ${KEYCLOAK_CLIENT_ID:tms-service}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:changeme}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:changeme}
  auth-token: ${TWILIO_AUTH_TOKEN:changeme}
  from-number: ${TWILIO_FROM_NUMBER:+1234567890}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:av-platform-assets}
  cdn-url: ${MINIO_CDN_URL:https://cdn.vnpt-av.com}
  region: ${MINIO_REGION:us-east-1}

saga:
  async:
    core-pool-size: ${SAGA_CORE_POOL_SIZE:5}
    max-pool-size: ${SAGA_MAX_POOL_SIZE:10}
    queue-capacity: ${SAGA_QUEUE_CAPACITY:50}
  services:
    ssc-url: ${SSC_SERVICE_URL:http://ssc-service:8080}
    bms-url: ${BMS_SERVICE_URL:http://bms-service:8080}
    dpe-url: ${DPE_SERVICE_URL:http://dpe-service:8080}
    vms-url: ${VMS_SERVICE_URL:http://vms-service:8080}
