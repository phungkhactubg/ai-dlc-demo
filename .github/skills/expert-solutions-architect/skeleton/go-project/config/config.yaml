# Application Configuration
# Override with environment variables using APP_ prefix
# Example: APP_SERVER_PORT=9090

server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 30s

mongodb:
  uri: mongodb://localhost:27017
  database: app_db
  connect_timeout: 10s
  max_pool_size: 100

redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 10

nats:
  url: nats://localhost:4222
  enable_jetstream: true

kafka:
  brokers:
    - localhost:9092
  consumer_group: app-group

mqtt:
  broker: tcp://localhost:1883
  client_id: app-client
  username: ""
  password: ""

s3:
  endpoint: localhost:9000
  access_key_id: minioadmin
  secret_access_key: minioadmin
  use_ssl: false
  default_bucket: default

postgres:
  dsn: postgres://user:password@localhost:5432/app_db?sslmode=disable
  max_conns: 25
  min_conns: 5

auth:
  jwt_secret: change-me-in-production
  jwt_expiration: 24h
  tenant_header: X-Tenant-ID

logging:
  level: info
  format: json
